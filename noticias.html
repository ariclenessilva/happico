<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="HAPPI & Co. — Notícias, análises e leituras de mercado.">
    <title>Notícias — HAPPI & Co.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="news-page">
    <!-- Navigation -->
    <nav class="navbar scrolled" id="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <img src="images/logo.jpeg" alt="HAPPI & Co. Logo">
                <span class="logo-text">HAPPI &amp; Co.</span>
            </a>
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html#home" class="nav-link">Início</a></li>
                <li><a href="index.html#about" class="nav-link">Sobre</a></li>
                <li><a href="index.html#services" class="nav-link">Serviços</a></li>
                <li><a href="index.html#principles" class="nav-link">Pilares</a></li>
                <li><a href="noticias.html" class="nav-link active">Notícias</a></li>
                <li><a href="index.html#contact" class="nav-link">Contacto</a></li>
            </ul>
            <button class="mobile-toggle" id="mobileToggle" aria-label="Abrir menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <!-- News Section -->
    <section id="news" class="news">
        <div class="container">
            <div class="section-header">
                <span class="section-label">Notícias</span>
                <h1 class="section-title">Análises e actualizações</h1>
                <p class="section-description">
                    Leituras de mercado, tendências e perspectivas da equipa HAPPI &amp; Co.
                </p>
            </div>

            <div class="news-layout">
                <aside class="news-sidebar">
                    <h3>Categorias</h3>
                    <ul class="news-filters-vertical" id="newsFilters">
                        <li><button class="filter-btn active" data-filter="todas">Todas</button></li>
                        <li><button class="filter-btn" data-filter="tecnologia">Tecnologia</button></li>
                        <li><button class="filter-btn" data-filter="negocios">Negócios</button></li>
                        <li><button class="filter-btn" data-filter="inovacao">Inovação</button></li>
                    </ul>
                </aside>

                <div class="news-scroll-container">
                    <div class="news-grid" id="newsGrid"></div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-brand">
                    <a href="index.html" class="logo">
                        <img src="images/logo.jpeg" alt="HAPPI & Co. Logo">
                        <span class="logo-text">HAPPI &amp; Co.</span>
                    </a>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; <span class="current-year">2026</span> HAPPI &amp; Co. Todos os direitos reservados.</p>
            </div>
        </div>
    </footer>

    <script src="news/newsData.js"></script>
    <script src="script.js"></script>
</body>
</html>
